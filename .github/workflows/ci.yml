name: CI Pipeline

on:
  push:
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  ci:
    name: Build, Test, Lint & Publish Image
    runs-on: self-hosted

    env:
      VERSION: 1.0.0

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build API
        run: make local-build

      - name: Run Tests
        run: make local-test

      - name: Run Lint
        run: make lint

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t student-api:${VERSION} .

      - name: Tag Docker Image
        run: docker tag student-api:${VERSION} ${{ secrets.DOCKER_USERNAME }}/student-api:${VERSION}

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-api:${VERSION}
